[Params]
`inp=
?inp=Input freesurfer output. You can also use regex such as /path/to/fs/subject/*
@inp=str

`ref=
?ref=Reference vtk file path or icosahedron level [0, 1, 2, 3, 4, 5, 6, 7]
@ref=str

`out=
?out=Output directory
@out=str

[Optional params]
mode=bc
?mode=interpolation mode
*mode=['nn', 'bc']
@mode=str

k=100
?k=TorchVtk finds the best face from k candidates of faces.
@k=int

thr=0.0
?thr=If the vertex's barycentric coord is less than thr, NN is used for the vertex.
@thr=float

suffix=
?suffix=If directory is given as out, suffix will be used.
@suffix=str

cpu=
?cpu=run on cpu if True
+cpu=store_true

save_ori=
?save_ori=save original vtk if true
+save_ori=store_true

pial=
?pial=save resampled pial vtk if true
+pial=store_true

white=
?white=save resampled white vtk if true
+white=store_true

inflated=
?inflated=save resampled inflated vtk if true
+inflated=store_true

vis_pial=
?vis_pial=save visualized resampled pial vtk if true
+vis_pial=store_true

vis_white=
?vis_white=save visualized resampled white vtk if true
+vis_white=store_true

vis_inflated=
?vis_inflated=save visualized resampled inflated vtk if true
+vis_inflated=store_true

vis_ori=
?vis_ori=save visualized original vtk if true
+vis_ori=store_true

vis_feature=thickness
?vis_feature=feature to visualize. string or list of string

width=1800
?width=visualized image width size

verbose=
?verbose=Verbose
+verbose=store_true

downsample=0
?downsample=If over than 0, nan_avg_pool op is applied.
@downsample=int

skip_exist=
?skip_exist=skip if output file exists
+skip_exist=store_true

